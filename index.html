<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Only Dinghies — small boats, summer friends, and good days." />
    <title>Only Dinghies</title>
    <script>
      (() => {
        const param = new URLSearchParams(window.location.search).get("scoutTheme");
        const theme =
          param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --cp-bg: #f7f4ef;
        --cp-bg-elevated: #fcfbf8;
        --cp-surface: #ffffff;
        --cp-surface-soft: #f5f5f5;
        --cp-border: #dedede;
        --cp-border-strong: #919191;
        --cp-text: #242424;
        --cp-text-muted: #5c5c5c;
        --cp-text-soft: #6f6f6f;
        --cp-accent: #b11f4b;
        --cp-accent-hover: #9a1a41;
        --cp-accent-soft: rgba(177, 31, 75, 0.08);
        --cp-accent-fg: #ffffff;
        --cp-success: #16a34a;
        --cp-danger: #dc2626;
        --cp-warning: #f59e0b;
        --cp-link: #0078d4;
        --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
        --cp-overlay: rgba(255, 255, 255, 0.8);
        --cp-panel: rgba(255, 255, 255, 0.86);
        --cp-panel-strong: rgba(255, 255, 255, 0.96);
        --cp-sheen: rgba(255, 255, 255, 0.55);
        --cp-highlight: rgba(177, 31, 75, 0.12);
      }
      html[data-theme="dark"] {
        color-scheme: dark;
        --cp-bg: #3d3b3a;
        --cp-bg-elevated: #343231;
        --cp-surface: #292929;
        --cp-surface-soft: #2e2e2e;
        --cp-border: #474747;
        --cp-border-strong: #5f5f5f;
        --cp-text: #dedede;
        --cp-text-muted: #919191;
        --cp-text-soft: #b0b0b0;
        --cp-accent: #fd8ea1;
        --cp-accent-hover: #fb7b91;
        --cp-accent-soft: rgba(253, 142, 161, 0.14);
        --cp-accent-fg: #1a1a1a;
        --cp-success: #4ade80;
        --cp-danger: #f87171;
        --cp-warning: #fbbf24;
        --cp-link: #4da6ff;
        --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        --cp-overlay: rgba(41, 41, 41, 0.88);
        --cp-panel: rgba(41, 41, 41, 0.72);
        --cp-panel-strong: rgba(41, 41, 41, 0.96);
        --cp-sheen: rgba(255, 255, 255, 0.04);
        --cp-highlight: rgba(253, 142, 161, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        align-items: center;
        background: var(--cp-bg);
        color: var(--cp-text);
        display: flex;
        font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        background: var(--cp-surface);
        border: 1px solid var(--cp-border);
        border-radius: 16px;
        box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
        max-width: 680px;
        overflow: hidden;
        text-align: center;
        width: 100%;
      }
      .sun {
        align-items: center;
        background: var(--cp-accent-soft);
        border-bottom: 1px solid var(--cp-border);
        display: flex;
        font-size: clamp(4.5rem, 14vw, 7.5rem);
        height: 180px;
        justify-content: center;
      }
      .content { padding: 36px 28px 28px; }
      .eyebrow {
        color: var(--cp-accent);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 {
        font-size: clamp(2.8rem, 8vw, 4.8rem);
        letter-spacing: -0.07em;
        line-height: 0.95;
        margin: 14px 0 18px;
      }
      p { color: var(--cp-text-muted); font-size: 1.08rem; line-height: 1.55; margin: 0 auto; max-width: 460px; }
      .details {
        border-block: 1px solid var(--cp-border);
        display: flex;
        justify-content: center;
        margin: 30px 0;
        padding: 16px 0;
      }
      .details span { color: var(--cp-text-soft); font-size: 0.88rem; padding: 0 16px; }
      .details span + span { border-left: 1px solid var(--cp-border); }
      .button {
        background: var(--cp-accent);
        border-radius: 0.625rem;
        color: var(--cp-accent-fg);
        display: inline-block;
        font-weight: 800;
        padding: 12px 18px;
        text-decoration: none;
      }
      .button:hover { background: var(--cp-accent-hover); }
      .note { color: var(--cp-text-soft); font-size: 0.8rem; margin-top: 16px; }
      @media (max-width: 440px) {
        .sun { height: 145px; }
        .content { padding: 28px 20px 22px; }
        .details span { padding: 0 10px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="sun" aria-hidden="true">☀️</div>
      <div class="content">
        <div class="eyebrow">Italian summer, small boats</div>
        <h1>Only Dinghies</h1>
        <p>For friends, little sails, salty swims, and long lunches somewhere near the water.</p>
        <div class="details">
          <span>🛶 Bring a hat</span>
          <span>🍋 Bring a friend</span>
        </div>
        <a class="button" href="mailto:hello@onlydinghies.com?subject=I'm%20in%20for%20a%20dinghy%20day">I’m in</a>
        <div class="note">No rules. No big boats. Just good days.</div>
      </div>
    </main>
  </body>
</html>
